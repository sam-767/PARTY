<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Edit Pop-up</title>
    <style>
        /* The Pop-up Overlay */
        #edit-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            visibility: visible;
        }

        /* The Container for Photos */
        .video-container {
            position: relative;
            width: 80%;
            max-width: 500px;
            height: 70vh;
            overflow: hidden;
            border: 5px solid #fff;
            box-shadow: 0 0 50px rgba(255,255,255,0.2);
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transform: scale(1.2);
        }

        /* The "Edit" Animation */
        @keyframes flashZoom {
            0% { opacity: 0; transform: scale(1.5); filter: brightness(2); }
            10% { opacity: 1; filter: brightness(1); }
            90% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.9); }
        }

        .active {
            animation: flashZoom 0.6s ease-in-out forwards;
        }

        /* Close Button */
        #close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            cursor: pointer;
            font-family: sans-serif;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="edit-overlay">
    <div id="close-btn" onclick="closeEdit()">SKIP ×</div>
    <div class="video-container" id="slides-wrapper">
        <img src="https://picsum.photos/500/800?random=1" class="slide">
        <img src="https://picsum.photos/500/800?random=2" class="slide">
        <img src="https://picsum.photos/500/800?random=3" class="slide">
        <img src="https://picsum.photos/500/800?random=4" class="slide">
        <img src="https://picsum.photos/500/800?random=5" class="slide">
    </div>
</div>

<script>
    const slides = document.querySelectorAll('.slide');
    let currentSlide = 0;

    function runEdit() {
        if (currentSlide < slides.length) {
            slides[currentSlide].classList.add('active');
            
            // Wait for animation to finish (600ms) then next photo
            setTimeout(() => {
                slides[currentSlide].classList.remove('active');
                currentSlide++;
                runEdit();
            }, 600); 
        } else {
            // Auto-close when done
            setTimeout(closeEdit, 500);
        }
    }

    function closeEdit() {
        document.getElementById('edit-overlay').style.display = 'none';
    }

    // Start the "Video" when page loads
    window.onload = runEdit;
</script>

</body>
</html>
